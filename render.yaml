# render.yaml — Render deployment configuration
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── Backend API ────────────────────────────────
  - type: web
    name: adflow-pro-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false   # set manually in Render dashboard
      - key: JWT_SECRET
        sync: false   # set manually in Render dashboard
      - key: CLIENT_URL
        sync: false   # set to your frontend URL after deploying frontend
      - key: CRON_ENABLED
        value: "true"

  # ── Frontend Static Site ────────────────────────
  - type: web
    name: adflow-pro-client
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false   # set to https://adflow-pro-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
